<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Infinity Tic Tac Toe - Pro</title>
<style>
    :root {
        --bg-grad-1: #0f2027; --bg-grad-2: #203a43; --bg-grad-3: #2c5364;
        --glass-bg: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
        --x-color: #ff4757; --o-color: #1e90ff;
    }
    
    body {
        margin: 0; padding: 0; display: flex; height: 100vh; width: 100vw;
        background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2), var(--bg-grad-3));
        color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden; touch-action: none; user-select: none;
    }

    .center {
        flex: 1; display: flex; flex-direction: column;
        justify-content: center; align-items: center; padding: 15px;
    }

    .game-container {
        width: 100%; max-width: 450px; aspect-ratio: 9/16; max-height: 95vh;
        background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        border: 1px solid var(--glass-border); border-radius: 24px;
        display: flex; flex-direction: column; align-items: center;
        padding: 20px 15px; box-sizing: border-box; position: relative;
        box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    h1 { margin: 0 0 5px 0; font-size: 28px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; background: linear-gradient(45deg, #f39c12, #f1c40f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .author-link {
        color: #0ff; text-decoration: none; font-weight: bold; font-size: 14px;
        margin-bottom: 20px; transition: 0.3s; letter-spacing: 1px;
    }
    .author-link:hover { text-shadow: 0 0 8px #0ff; }

    .header-controls { display: flex; gap: 10px; margin-bottom: 15px; width: 100%; justify-content: center;}

    button {
        appearance: none; border: none; padding: 12px 20px;
        border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 15px;
        transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 1px;
        color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    button:active { transform: scale(0.95); }

    #themeTrigger { background: linear-gradient(135deg, #8e44ad, #9b59b6); }
    #backHome { background: linear-gradient(135deg, #c0392b, #e74c3c); display: none; }

    /* Board Area */
    .big-square {
        width: 100%; aspect-ratio: 1/1; position: relative;
        display: flex; justify-content: center; align-items: center; margin-top: 10px;
    }
    
    .board {
        position: absolute; width: 100%; height: 100%;
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
        visibility: hidden;
    }

    .cell {
        background: rgba(0, 0, 0, 0.2); border-radius: 16px;
        display: flex; justify-content: center; align-items: center;
        cursor: pointer; overflow: hidden; position: relative;
        box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
    }
    .cell:hover { background: rgba(255, 255, 255, 0.05); }

    .cell img {
        width: 75%; height: 75%; object-fit: cover; border-radius: 12px;
        pointer-events: none; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    /* Warning for disappearing token */
    .fading img {
        animation: pulseWarn 1s infinite alternate;
        filter: drop-shadow(0 0 5px red) grayscale(30%); border: 2px solid red;
    }

    @keyframes popIn { 0% { transform: scale(0) rotate(-20deg); opacity: 0; } 100% { transform: scale(1) rotate(0); opacity: 1; } }
    @keyframes pulseWarn { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0.85); opacity: 0.6; } }

    /* Menus & Overlays */
    .menu { width: 100%; display: flex; flex-direction: column; gap: 15px; position: absolute; }
    .menu .mode { width: 80%; margin: 0 auto; padding: 20px; font-size: 1.2em; border-radius: 16px; }
    .menu .mode-2p { background: linear-gradient(135deg, #2980b9, #3498db); }
    .menu .mode-bot { background: linear-gradient(135deg, #d35400, #e67e22); }

    .winner-screen {
        position: absolute; inset: 0; display: none; flex-direction: column;
        justify-content: center; align-items: center;
        background: rgba(0,0,0,0.8); border-radius: 24px; z-index: 50;
        backdrop-filter: blur(5px); animation: fadeIn 0.3s;
    }
    .winner-screen h2 { color: #fff; font-size: 40px; margin-bottom: 20px; text-shadow: 0 0 20px gold; }
    .winner-screen button { background: linear-gradient(135deg, #27ae60, #2ecc71); padding: 15px 30px; font-size: 18px; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .win-line {
        position: absolute; height: 6px; background: #fff; box-shadow: 0 0 15px #fff;
        transform-origin: 0 50%; z-index: 10; border-radius: 10px;
        animation: drawLine 0.5s ease-out forwards;
    }
    @keyframes drawLine { from { width: 0; } }

    #themeOverlay {
        display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.7);
        justify-content: center; align-items: center; z-index: 200; backdrop-filter: blur(8px);
    }
    #themeOverlay .popup {
        background: #1e272e; padding: 25px; border-radius: 20px; text-align: center;
        width: 85%; max-width: 320px; border: 1px solid rgba(255,255,255,0.2);
    }
    #themeOverlay h3 { margin-top: 0; color: #fff; margin-bottom: 20px; }
    #themeOverlay button { margin: 8px; width: calc(100% - 16px); background: #34495e; }
    #themeOverlay .back-btn { background: #c0392b; margin-top: 20px; }
    
    #camera-container { display: none; margin-top: 15px; position: relative; border-radius: 12px; overflow: hidden; border: 2px solid #0ff; }
    #camera { width: 100%; display: block; }
    #captureBtn { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: #2ecc71; padding: 10px; border-radius: 50%; width: 50px; height: 50px; border: 3px solid #fff; }
</style>
</head>
<body>

<div class="center">
    <div class="game-container">
        <h1>Tic Tac Toe</h1>
        <a href="https://youtube.com/@golutheghost-4444?si=3ny96yTFbFjFtwx4" target="_blank" class="author-link">GOLu the GhosT</a>

        <div class="header-controls">
            <button id="themeTrigger" onclick="openThemeMenu()">🎭 Custom Face</button>
            <button id="backHome" onclick="goHome()">🏠 Home</button>
        </div>

        <div class="big-square">
            <div class="board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>

            <div class="menu" id="menu">
                <button class="mode mode-2p" onclick="setMode('2p')">🫂 2 Players</button>
                <button class="mode mode-bot" onclick="setMode('bot')">🤖 Vs Bot</button>
            </div>

            <div class="winner-screen" id="winnerScreen">
                <h2 id="winnerText">X WINS!</h2>
                <button onclick="restartGame()">Play Again</button>
            </div>
        </div>

        <!-- Theme Modal -->
        <div id="themeOverlay">
            <div class="popup">
                <h3>Set Token Image</h3>
                <button onclick="startCamera('X')">📸 Set X Image</button>
                <button onclick="startCamera('O')">📸 Set O Image</button>
                
                <div id="camera-container">
                    <video id="camera" autoplay playsinline></video>
                    <button id="captureBtn"></button>
                </div>

                <button class="back-btn" onclick="closeThemeMenu()">⬅ Back</button>
            </div>
        </div>
    </div>
</div>
<canvas id="snapshot" style="display:none;"></canvas>

<script>
// --- AUDIO SYSTEM (Procedural) ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    
    if (type === 'tap') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
        gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'delete') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.2);
        gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
    } else if (type === 'win') {
        osc.type = 'triangle'; osc.frequency.setValueAtTime(400, now); osc.frequency.setValueAtTime(600, now + 0.1); osc.frequency.setValueAtTime(800, now + 0.2);
        gain.gain.setValueAtTime(0.5, now); gain.gain.linearRampToValueAtTime(0, now + 0.4);
        osc.start(now); osc.stop(now + 0.4);
    }
}

// --- GAME LOGIC ---
let gameMode = null, turn = "X", gameOver = false;
let xOrder = [], oOrder = [];
let currentCaptureToken = null;

// High-quality Base64 SVGs as default tokens
const defaultImages = {
    X: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M20 20 L80 80 M80 20 L20 80" stroke="%23ff4757" stroke-width="12" stroke-linecap="round"/></svg>',
    O: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="32" stroke="%231e90ff" stroke-width="12" fill="none"/></svg>'
};
let tokenImages = {
    X: localStorage.getItem("tokenX") || defaultImages.X,
    O: localStorage.getItem("tokenO") || defaultImages.O
};

const winPatterns = [ [0,1,2],[3,4,5],[6,7,8], [0,3,6],[1,4,7],[2,5,8], [0,4,8],[2,4,6] ];

function setMode(mode){
    playSound('tap'); gameMode = mode;
    document.getElementById("menu").style.display="none";
    document.getElementById("board").style.visibility="visible";
    document.getElementById("backHome").style.display="block";
}

function showWinner(symbol){
    gameOver = true; playSound('win');
    setTimeout(() => {
        document.getElementById("winnerText").innerHTML = `<img src="${tokenImages[symbol]}" style="width:50px; vertical-align:middle; border-radius:10px;"> WINS!`;
        document.getElementById("winnerScreen").style.display = "flex";
    }, 800);
}

function restartGame(){
    playSound('tap'); clearBoard();
    document.getElementById("winnerScreen").style.display="none";
}

function goHome(){
    playSound('tap'); clearBoard();
    document.getElementById("menu").style.display="flex";
    document.getElementById("board").style.visibility="hidden";
    document.getElementById("backHome").style.display="none";
    document.getElementById("winnerScreen").style.display="none";
}

function clearBoard(){
    document.querySelectorAll(".cell").forEach(c=>{
        c.innerHTML=""; c.removeAttribute("data-symbol"); c.classList.remove('fading');
    });
    xOrder = []; oOrder = []; turn="X"; gameOver=false;
    document.querySelectorAll(".win-line").forEach(line=>line.remove());
}

function updateFadingIndicators() {
    document.querySelectorAll(".cell").forEach(c => c.classList.remove('fading'));
    if(xOrder.length === 3) document.querySelector(`.cell[data-index="${xOrder[0]}"]`).classList.add('fading');
    if(oOrder.length === 3) document.querySelector(`.cell[data-index="${oOrder[0]}"]`).classList.add('fading');
}

function drawWinningLine(pattern){
    const board = document.getElementById("board");
    const cells = document.querySelectorAll(".cell");
    const rectA = cells[pattern[0]].getBoundingClientRect();
    const rectC = cells[pattern[2]].getBoundingClientRect();
    const boardRect = board.getBoundingClientRect();
    const x1 = rectA.left + rectA.width/2 - boardRect.left;
    const y1 = rectA.top  + rectA.height/2 - boardRect.top;
    const x2 = rectC.left + rectC.width/2 - boardRect.left;
    const y2 = rectC.top  + rectC.height/2 - boardRect.top;
    const line = document.createElement("div");
    line.classList.add("win-line");
    line.style.width = Math.hypot(x2-x1, y2-y1) + "px";
    line.style.transform = `translate(${x1}px,${y1}px) rotate(${Math.atan2(y2-y1,x2-x1)}rad)`;
    board.appendChild(line);
}

function getBoardArr(){ return [...document.querySelectorAll(".cell")].map(c=>c.dataset.symbol||null); }

function checkWinnerUI(){
    const arr = getBoardArr();
    for(const p of winPatterns){
        const [a,b,c]=p;
        if(arr[a] && arr[a]===arr[b] && arr[a]===arr[c]) {
            drawWinningLine(p); showWinner(arr[a]); return true;
        }
    }
    return false;
}

function placeSymbol(cell, symbol){
    const idx = +cell.getAttribute("data-index");
    if(cell.dataset.symbol) return false; 
    
    playSound('tap');
    const img = document.createElement("img");
    img.src = tokenImages[symbol];
    // Fallback if custom image breaks
    img.onerror = () => { img.src = defaultImages[symbol]; };
    cell.appendChild(img); cell.dataset.symbol = symbol;

    let targetArray = symbol === "X" ? xOrder : oOrder;
    targetArray.push(idx);
    
    if(targetArray.length > 3){
        playSound('delete');
        const rem = targetArray.shift();
        const rc = document.querySelector(`.cell[data-index="${rem}"]`);
        if(rc){ rc.innerHTML=""; rc.removeAttribute("data-symbol"); rc.classList.remove('fading'); }
    }
    updateFadingIndicators();
    return true;
}

document.querySelectorAll(".cell").forEach(cell=>{
    cell.addEventListener("click",()=>{
        if(gameOver) return;
        if(!placeSymbol(cell, turn)) return;
        if(checkWinnerUI()) return;

        if(gameMode==="bot" && turn==="X"){
            turn="O"; setTimeout(botMove, 400); // Slight delay for bot thinking feel
        } else {
            turn = (turn==="X") ? "O" : "X";
        }
    });
});

// --- BOT LOGIC (Minimax with Infinity rules context) ---
function botMove(){
    if(gameOver) return;
    const board = getBoardArr();
    let bestScore = -Infinity; let bestIdx = null;

    let emptyCells = [];
    for(let i=0; i<9; i++) if(!board[i]) emptyCells.push(i);

    // Simplistic heuristic to save browser memory rather than deep minimax for infinity mode
    // Bot prioritizes winning, then blocking, then center, then random.
    for(let i of emptyCells) {
        board[i] = "O";
        if(checkWinLogic(board) === "O") { bestIdx = i; break; }
        board[i] = null;
    }
    if(bestIdx === null) {
        for(let i of emptyCells) {
            board[i] = "X";
            if(checkWinLogic(board) === "X") { bestIdx = i; break; }
            board[i] = null;
        }
    }
    if(bestIdx === null) {
        if(emptyCells.includes(4)) bestIdx = 4;
        else bestIdx = emptyCells[Math.floor(Math.random() * emptyCells.length)];
    }

    if(bestIdx !== null){
        const cell = document.querySelector(`.cell[data-index="${bestIdx}"]`);
        placeSymbol(cell, "O");
        if(!checkWinnerUI()) turn = "X";
    }
}
function checkWinLogic(arr){
    for(const p of winPatterns){
        if(arr[p[0]] && arr[p[0]]===arr[p[1]] && arr[p[0]]===arr[p[2]]) return arr[p[0]];
    }
    return null;
}

// --- CAMERA / THEME LOGIC ---
function openThemeMenu(){ playSound('tap'); document.getElementById("themeOverlay").style.display = "flex"; }
function closeThemeMenu(){ 
    playSound('tap'); document.getElementById("themeOverlay").style.display = "none";
    stopCamera();
}

function stopCamera() {
    const video = document.getElementById("camera");
    if (video.srcObject){
        try { video.srcObject.getTracks().forEach(t=>t.stop()); } catch(e){}
    }
    document.getElementById("camera-container").style.display = "none";
}

function startCamera(token){
    playSound('tap'); currentCaptureToken = token;
    const video = document.getElementById("camera");
    document.getElementById("camera-container").style.display = "block";
    
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
    .then(stream => { video.srcObject = stream; })
    .catch(err => { alert("Camera error: " + err); stopCamera(); });
}

document.getElementById("captureBtn").onclick = () => {
    playSound('tap');
    const video = document.getElementById("camera");
    const canvas = document.getElementById("snapshot");
    const ctx = canvas.getContext("2d");
    
    // Crop to square for perfect fit
    const size = Math.min(video.videoWidth, video.videoHeight);
    canvas.width = size; canvas.height = size;
    const startX = (video.videoWidth - size) / 2;
    const startY = (video.videoHeight - size) / 2;
    
    ctx.drawImage(video, startX, startY, size, size, 0, 0, size, size);
    
    const dataURL = canvas.toDataURL("image/png");
    tokenImages[currentCaptureToken] = dataURL;
    localStorage.setItem("token"+currentCaptureToken, dataURL);
    
    stopCamera();
    alert(currentCaptureToken + " Image Updated!");
};
</script>
</body>
</html>
